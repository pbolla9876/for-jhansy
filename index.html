<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift for Jhansy</title>
  <style>
    :root {
      --rose: #c95e8b;
      --rose-deep: #a84871;
      --cream: #fffaf6;
      --paper: #ffffff;
      --text: #4a3f3f;
      --gold-soft: #d4af37;
    }

    body, html { 
      margin: 0; padding: 0; 
      background: var(--cream);
      font-family: 'Georgia', serif;
      overflow: hidden; /* Lock scroll until letter is done */
    }

    /* --- Cinematic Intro --- */
    #ceremony-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5000;
    }

    @keyframes envelopeFloat {
      0% { transform: translateY(-200px) rotate(-5deg); opacity: 0; }
      100% { transform: translateY(0) rotate(0deg); opacity: 1; }
    }

    /* --- The Physical Envelope --- */
    .envelope {
      width: 300px; height: 200px;
      background: #f3ebd6;
      border: 1px solid #dcd0b8;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      animation: envelopeFloat 2s ease-out forwards;
      position: relative;
      transition: all 0.5s ease;
    }

    .envelope:hover { transform: scale(1.05); }

    .envelope-name {
      font-size: 1.8rem; color: var(--rose-deep);
      letter-spacing: 4px; text-transform: uppercase;
      border-bottom: 1px solid var(--rose); padding-bottom: 5px;
    }

    /* --- The Formal Letter (Stationery) --- */
    #letter-scene {
      display: none; /* Hidden until envelope clicked */
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%; max-width: 500px;
      height: 80vh;
      background: var(--paper);
      box-shadow: 0 0 50px rgba(0,0,0,0.1);
      border: 15px solid white; /* Paper border effect */
      outline: 1px solid #eee;
      padding: 40px 20px;
      overflow-y: auto;
      scrollbar-width: none;
      z-index: 6000;
    }

    .letter-header {
      text-align: center; margin-bottom: 30px;
      border-bottom: 1px double #eee; padding-bottom: 20px;
    }

    .letterhead-name {
      font-size: 2rem; color: var(--rose-deep);
      letter-spacing: 6px; text-transform: uppercase; margin: 0;
    }

    .leaf-icon { color: #3ba35e; font-size: 1.5rem; }

    #typed-text {
      font-size: 1.1rem; line-height: 1.9; color: var(--text);
      white-space: pre-wrap; padding: 0 10px;
    }

    /* --- UI Prompts --- */
    .scroll-hint {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: var(--rose-deep); font-weight: bold; opacity: 0;
      transition: opacity 1s; z-index: 7000;
      text-align: center;
    }

    .show-hint { opacity: 1; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% {transform:translate(-50%, 0);} 50% {transform:translate(-50%, -10px);} }

    /* --- Background Fade --- */
    .fade-out { opacity: 0; pointer-events: none; transition: 1s; }
  </style>
</head>
<body>

  <div id="ceremony-overlay">
    <div class="envelope" id="envelope" onclick="openLetter()">
      <div class="envelope-name">Jhansy</div>
    </div>

    <div id="letter-scene">
      <div class="letter-header">
        <h1 class="letterhead-name">JHANSY <span class="leaf-icon">🌿</span></h1>
        <p style="font-size: 0.8rem; color: #999; letter-spacing: 2px;">STRICTLY PRIVATE</p>
      </div>
      <div id="typed-text"></div>
    </div>

    <div class="scroll-hint" id="scrollHint">
      Scroll down to begin your day...<br>↓
    </div>
  </div>

  <script>
    const message = `Hi Jaanu...\n\nChustu chustune 25 days ayipoyindhi kada. Last time when you got this, I was with you.\n\nBefore that, I used to send the flowers, coffee, and ice cream... but this time I can't do any of those.\n\nBut nenu idiot ni kada? Mental fellow ni! Agutanu anukuntunava? NEVER.\n\nSo Jhansy, happy menstrual day! Idi kuda "happy" antunna ani thittoku... ledu le, already tittukune unattu unnav... ninnu chuste telsustundhi le. But its ok.\n\nSo Jhansy, here we go. I made something for you to make your spirit high when your body is down.\n\nOka dialogue cheppi finish chesthe super untundhi kada...\n\nJaanu, nuvvu iroju prapanchanni chudalekapothe enti? Ah prapanchanni nee daggariki teeskuni vasta! 😂😂😍😍\n\nHahaha... Baga navvukunnaava? So roju anta ilane navvukunta undhu.`;

    function openLetter() {
      const env = document.getElementById('envelope');
      const scene = document.getElementById('letter-scene');
      const typedTarget = document.getElementById('typed-text');
      const scrollHint = document.getElementById('scrollHint');

      // Hide envelope
      env.style.opacity = '0';
      env.style.transform = 'scale(0.8)';
      
      setTimeout(() => {
        env.style.display = 'none';
        scene.style.display = 'block';
        
        // Typing effect
        let i = 0;
        function typeWriter() {
          if (i < message.length) {
            typedTarget.innerHTML += message.charAt(i);
            i++;
            // Auto-scroll the letter down as it types
            scene.scrollTop = scene.scrollHeight;
            setTimeout(typeWriter, 45);
          } else {
            scrollHint.classList.add('show-hint');
            document.body.style.overflow = 'auto'; // Unlock scroll
          }
        }
        typeWriter();
      }, 600);
    }
  </script>
</body>
</html>
