<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift for Jhansy</title>
  <style>
    :root {
      --rose: #c95e8b;
      --rose-deep: #a84871;
      --cream: #fffaf6;
      --paper: #ffffff;
      --text: #4a3f3f;
      --muted: #8b7676;
      --green: #3ba35e;
    }

    * { box-sizing: border-box; }
    body, html { 
      margin: 0; padding: 0; 
      background: var(--cream);
      font-family: 'Georgia', serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* --- PHASE 1: THE CEREMONY (Envelope & Letter) --- */
    #ceremony-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5000; background: var(--cream);
      transition: opacity 1.5s ease;
    }

    @keyframes envelopeLand {
      0% { transform: translateY(-300px) rotate(-10deg); opacity: 0; filter: blur(10px); }
      100% { transform: translateY(0) rotate(0deg); opacity: 1; filter: blur(0); }
    }

    .envelope {
      width: 320px; height: 220px;
      background: #f4ecd8; border: 1px solid #e0d5ba;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; animation: envelopeLand 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      transition: transform 0.4s ease;
    }
    .envelope:hover { transform: scale(1.05); }
    .envelope-name { font-size: 2rem; color: var(--rose-deep); letter-spacing: 5px; text-transform: uppercase; border-bottom: 2px solid var(--rose); padding-bottom: 5px; }

    #letter-scene {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%; max-width: 550px; height: 80vh;
      background: var(--paper); border: 15px solid white;
      box-shadow: 0 0 60px rgba(0,0,0,0.15);
      z-index: 6000; overflow-y: auto; scrollbar-width: none;
      padding: 40px 20px;
    }

    .letter-header { text-align: center; margin-bottom: 30px; border-bottom: 1px double #eee; padding-bottom: 20px; }
    .letterhead-name { font-size: 2.2rem; color: var(--rose-deep); letter-spacing: 6px; text-transform: uppercase; margin: 0; }
    .letterhead-sub { font-size: 0.75rem; color: #999; letter-spacing: 3px; margin-top: 10px; }
    #typed-text { font-size: 1.15rem; line-height: 2; color: var(--text); white-space: pre-wrap; padding: 0 15px; }

    /* --- PHASE 2: THE FLOWERS ENTRANCE --- */
    .flower-hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(circle at center, #fff0f5 0%, #fffaf6 100%);
      padding: 0 20px;
    }

    .flower-hero h2 {
      font-size: clamp(2.5rem, 10vw, 4.5rem);
      color: var(--rose-deep);
      font-style: italic;
      font-weight: 400;
      margin: 0;
      opacity: 0;
      transform: scale(0.95);
      filter: blur(10px);
      transition: all 2.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .flower-hero.reveal h2 { opacity: 1; transform: scale(1); filter: blur(0); }
    .flower-sub { margin-top: 20px; color: var(--muted); letter-spacing: 3px; font-size: 0.9rem; opacity: 0; transition: opacity 2s ease 1s; }
    .flower-hero.reveal .flower-sub { opacity: 1; }

    /* --- PROMPTS & UI --- */
    .scroll-hint {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: var(--rose-deep); font-weight: bold; opacity: 0;
      transition: opacity 1s; z-index: 7000; text-align: center;
    }
    .show-hint { opacity: 1; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% {transform:translate(-50%, 0);} 50% {transform:translate(-50%, -10px);} }

    /* --- MAIN CONTENT SECTIONS --- */
    #main-world { opacity: 0; filter: blur(20px); transition: all 2.5s ease; }
    .world-active #main-world { opacity: 1; filter: blur(0); }
    .world-active #ceremony-overlay { opacity: 0; pointer-events: none; }

    .section { padding: 5rem 1rem; max-width: 800px; margin: 0 auto; opacity: 0; transform: translateY(40px); transition: 1.5s; }
    .section.visible { opacity: 1; transform: translateY(0); }
    .card { background: white; border-radius: 30px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(150,120,120,0.1); }
  </style>
</head>
<body>

  <div id="ceremony-overlay">
    <div class="envelope" id="envelope" onclick="openLetter()">
      <div class="envelope-name">Jhansy</div>
    </div>

    <div id="letter-scene">
      <div class="letter-header">
        <h1 class="letterhead-name">JHANSY <span style="color:var(--green)">🌿</span></h1>
        <p class="letterhead-sub">STRICTLY PRIVATE</p>
      </div>
      <div id="typed-text"></div>
    </div>

    <div class="scroll-hint" id="scrollHint">
      Scroll down to see the world...<br>↓
    </div>
  </div>

  <div id="main-world">
    
    <div class="flower-hero" id="flowerHero">
      <h2>Flowers ivvalli kada...</h2>
      <p class="flower-sub">SO I BROUGHT THE GARDEN TO YOU.</p>
    </div>

    <section class="section" id="morningSection">
      <div class="card">
        <span style="color: var(--rose-deep); font-weight: bold;">🌸 9:00 AM — Morning Bloom</span>
        <p style="margin-top: 1rem;">Good morning, Jaanu. Nuvvu bayataki vellalenu ante emi parvaledu... ee flowers chustu refresh avvu.</p>
        <div style="margin-top: 2rem; border-radius: 20px; overflow: hidden;">
          <img src="flowers1.jpg" alt="Flowers" style="width: 100%; display: block;">
        </div>
      </div>
    </section>

    <div style="height: 100vh;"></div>
  </div>

  <script>
    const text = `Hi Jaanu...\n\nChustu chustune 25 days ayipoyindhi kada. Last time when you got this, I was with you.\n\nBefore that, I used to send the flowers, coffee, and ice cream... but this time I can't do any of those.\n\nBut nenu idiot ni kada? Mental fellow ni! Agutanu anukuntunava? NEVER.\n\nSo Jhansy, happy menstrual day! Idi kuda "happy" antunna ani thittoku... ledu le, already tittukune unattu unnav... ninnu chuste telsustundhi le. But its ok.\n\nSo Jhansy, here we go. I made something for you to make your spirit high when your body is down.\n\nOka dialogue cheppi finish chesthe super untundhi kada...\n\nJaanu, nuvvu iroju prapanchanni chudalekapothe enti? Ah prapanchanni nee daggariki teeskuni vasta! 😂😂😍😍\n\nHahaha... Baga navvukunnaava? So roju anta ilane navvukunta undhu.`;

    function openLetter() {
      const env = document.getElementById('envelope');
      const scene = document.getElementById('letter-scene');
      const typedTarget = document.getElementById('typed-text');
      const scrollHint = document.getElementById('scrollHint');

      env.style.opacity = '0';
      env.style.transform = 'translateY(50px) scale(0.9)';
      
      setTimeout(() => {
        env.style.display = 'none';
        scene.style.display = 'block';
        
        let i = 0;
        function typeWriter() {
          if (i < text.length) {
            typedTarget.innerHTML += text.charAt(i);
            i++;
            scene.scrollTop = scene.scrollHeight;
            setTimeout(typeWriter, 40);
          } else {
            scrollHint.classList.add('show-hint');
            document.body.style.overflow = 'auto'; 
          }
        }
        typeWriter();
      }, 800);
    }

    function updateAnimations() {
      if (window.scrollY > 50) document.body.classList.add('world-active');

      const hero = document.getElementById('flowerHero');
      const section = document.getElementById('morningSection');

      if (hero.getBoundingClientRect().top < window.innerHeight * 0.7) hero.classList.add('reveal');
      if (section.getBoundingClientRect().top < window.innerHeight * 0.8) section.classList.add('visible');
    }

    window.addEventListener('scroll', updateAnimations);
    document.body.style.overflow = 'hidden'; // Lock at start
  </script>
</body>
</html>
