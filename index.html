<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift for Jhansy</title>
  <style>
    :root {
      --rose: #c95e8b;
      --rose-deep: #a84871;
      --cream: #fffaf6;
      --paper: #ffffff;
      --text: #4a3f3f;
      --muted: #8b7676;
      --matcha-deep: #5d7a44;
    }

    * { box-sizing: border-box; }
    
    html, body { 
      margin: 0; padding: 0; 
      background: var(--cream);
      font-family: 'Georgia', serif;
      height: 100vh;
      width: 100%;
      overflow: hidden; 
    }

    /* Section Management */
    .snap-section {
      height: 100vh;
      width: 100%;
      position: absolute;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.8s ease, transform 1s cubic-bezier(0.65, 0, 0.35, 1);
      z-index: 10;
      padding: 20px;
      text-align: center;
    }

    .snap-section.active {
      opacity: 1;
      visibility: visible;
      z-index: 20;
    }

    /* Overlay Ceremony */
    #ceremony-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; background: var(--cream);
      transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1);
    }

    .envelope {
      width: 280px; height: 180px;
      background: #f4ecd8; border: 1px solid #dcd0b8;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    #letter-scene {
      display: none; width: 90%; max-width: 450px; height: 70vh;
      background: var(--paper); border: 12px solid white;
      box-shadow: 0 0 50px rgba(0,0,0,0.1);
      overflow-y: auto; padding: 30px;
    }

    .hero-text { font-size: clamp(1.8rem, 6vw, 3rem); color: var(--rose-deep); font-style: italic; }

    .card { 
      background: white; border-radius: 30px; padding: 1.5rem; 
      width: 100%; max-width: 450px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.05);
      overflow-y: auto; max-height: 80vh;
    }

    .media-container { margin-top: 15px; border-radius: 15px; overflow: hidden; border: 3px solid #fff; background: #f0f0f0; }
    .media-container img, .media-container video { width: 100%; display: block; }

    .scroll-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: var(--rose-deep); font-weight: bold; opacity: 0; z-index: 110;
    }
    .show-hint { opacity: 1; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% {transform:translate(-50%, 0);} 50% {transform:translate(-50%, -10px);} }
  </style>
</head>
<body>

  <div id="ceremony-overlay">
    <div class="envelope" id="envelope" onclick="openLetter()">
      <div style="font-size: 1.5rem; color: var(--rose-deep); letter-spacing: 4px;">JHANSY</div>
    </div>
    <div id="letter-scene">
      <div id="typed-text" style="font-size: 1rem; line-height: 1.8; color: var(--text); white-space: pre-wrap;"></div>
    </div>
    <div class="scroll-hint" id="scrollHint">Scroll Down... ↓</div>
  </div>

  <div id="main-world" style="display: none;">
    
    <div class="snap-section active">
      <h2 class="hero-text">Flowers ivvalli kada...</h2>
    </div>

    <section class="snap-section">
      <div class="card">
        <h3 style="color: var(--rose-deep); font-style: italic; margin-top:0;">Morning Bloom 🌸</h3>
        <p style="color: var(--muted); font-size: 0.9rem;">Even virtually, they stay with me—my way of saying "I’m right here."</p>
        <div class="media-container"><img src="./flowers1.jpg"></div>
      </div>
    </section>

    <div class="snap-section">
      <h2 class="hero-text" style="color: var(--matcha-deep)">Starbucks for the first time... 🌿</h2>
    </div>

    <section class="snap-section">
      <div class="card" style="background: #f9fbf2;">
        <h3 style="color: var(--matcha-deep); font-style: italic; margin-top:0;">The Matcha Verdict 🍵</h3>
        <p style="color: var(--muted); font-size: 0.9rem;">I finally tried it! 😂 Check out the video below.</p>
        
        <div class="media-container">
          <img src="./motcha.png" alt="Matcha Latte">
        </div>

        <div class="media-container">
          <video id="matchaVideo" loop muted playsinline controls preload="auto" poster="./motcha.png">
            <source src="./starbucks.mov" type="video/quicktime">
            <source src="starbucks.mov" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        </div>
      </div>
    </section>

    <div class="snap-section">
      <h2 class="hero-text">Ready for something sweet? 🍫</h2>
    </div>

  </div>

  <script>
    const text = `Hi Jaanu...\n\nChustu chustune 25 days ayipoyindhi kada. Last time when you got this, I was with you.\n\nBefore that, I used to send the flowers, coffee, and ice cream... but this time I can't do any of those.\n\nBut nenu idiot ni kada? Mental fellow ni! Agutanu anukuntunava? NEVER.\n\nSo Jhansy, happy menstrual day!\n\nJaanu, nuvvu iroju prapanchanni chudalekapothe enti? Ah prapanchanni nee daggariki teeskuni vasta! 😂😂\n\nRoju anta ilane navvukunta undhu.`;

    let currentStep = 0;
    const steps = document.querySelectorAll('.snap-section');
    let canScroll = false;

    function openLetter() {
      document.getElementById('envelope').style.display = 'none';
      document.getElementById('letter-scene').style.display = 'block';
      let i = 0;
      function typeWriter() {
        if (i < text.length) {
          document.getElementById('typed-text').innerHTML += text.charAt(i);
          i++;
          document.getElementById('letter-scene').scrollTop = document.getElementById('letter-scene').scrollHeight;
          setTimeout(typeWriter, 35);
        } else {
          document.getElementById('scrollHint').classList.add('show-hint');
          document.getElementById('main-world').style.display = 'block';
          canScroll = true;
        }
      }
      typeWriter();
    }

    function navigate(direction) {
      if (!canScroll) return;
      
      const nextStep = (direction === 'down') ? currentStep + 1 : currentStep - 1;
      if (nextStep < 0 || nextStep >= steps.length) return;

      document.getElementById('ceremony-overlay').style.transform = 'translateY(-100vh)';
      
      steps[currentStep].classList.remove('active');
      currentStep = nextStep;
      steps[currentStep].classList.add('active');

      // Video Trigger
      const v = document.getElementById('matchaVideo');
      if (currentStep === 3) {
        v.play().catch(e => console.log("Video Play Error:", e)); 
      } else {
        v.pause();
      }

      canScroll = false;
      setTimeout(() => { canScroll = true; }, 1200);
    }

    window.addEventListener('wheel', (e) => navigate(e.deltaY > 0 ? 'down' : 'up'));
    let ts = 0;
    window.addEventListener('touchstart', (e) => ts = e.touches[0].clientY);
    window.addEventListener('touchend', (e) => {
      let te = e.changedTouches[0].clientY;
      if (ts - te > 50) navigate('down');
      if (te - ts > 50) navigate('up');
    });
  </script>
</body>
</html>
