<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift for Jhansy</title>
  <style>
    :root {
      --rose: #c95e8b; --rose-deep: #a84871; --cream: #fffaf6;
      --paper: #ffffff; --text: #4a3f3f; --muted: #8b7676; --matcha-deep: #5d7a44;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--cream); font-family: 'Georgia', serif; height: 100vh; width: 100%; overflow: hidden; }

    .snap-section {
      height: 100vh; width: 100%; position: absolute; top: 0; left: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: opacity 0.6s ease; z-index: 10; padding: 20px; text-align: center;
    }

    .snap-section.active { opacity: 1; visibility: visible; z-index: 20; }

    #ceremony-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; background: var(--cream); transition: transform 1s ease-in-out;
    }

    .envelope { width: 280px; height: 180px; background: #f4ecd8; border: 1px solid #dcd0b8; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    #letter-scene { display: none; width: 90%; max-width: 450px; height: 70vh; background: var(--paper); border: 12px solid white; box-shadow: 0 0 50px rgba(0,0,0,0.1); overflow-y: auto; padding: 30px; scrollbar-width: none; }

    .hero-text { font-size: clamp(1.6rem, 5vw, 2.3rem); color: var(--rose-deep); font-style: italic; margin: 0; line-height: 1.4; }
    .card { background: white; border-radius: 30px; padding: 1.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); }

    .media-container { margin-top: 15px; border-radius: 15px; overflow: hidden; border: 3px solid #fff; background: #eee; width: 100%; }
    .media-container img, .media-container video { width: 100%; display: block; object-fit: contain; }

    .scroll-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--rose-deep); font-weight: bold; opacity: 0; z-index: 110; }
    .show-hint { opacity: 1; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% {transform:translate(-50%, 0);} 50% {transform:translate(-50%, -10px);} }
  </style>
</head>
<body>

  <div id="ceremony-overlay">
    <div class="envelope" id="envelope" onclick="openLetter()">
      <div style="font-size: 1.5rem; color: var(--rose-deep); letter-spacing: 4px;">JHANSY</div>
    </div>
    <div id="letter-scene">
      <div id="typed-text" style="font-size: 1rem; line-height: 1.8; color: var(--text); white-space: pre-wrap;"></div>
    </div>
    <div class="scroll-hint" id="scrollHint">Scroll Down slowly... ↓</div>
  </div>

  <div id="main-world" style="display: none;">
    
    <div class="snap-section">
      <h2 class="hero-text">Flowers ivvalli kada...</h2>
    </div>

    <section class="snap-section">
      <div class="card">
        <h3 style="color: var(--rose-deep); font-style: italic; margin:0;">Morning Bloom 🌸</h3>
        <div class="media-container"><img src="./flowers1.jpg"></div>
      </div>
    </section>

    <div class="snap-section">
      <h2 class="hero-text" style="color: var(--matcha-deep)">Starbucks for the first time... 🌿</h2>
    </div>

    <section class="snap-section">
      <div class="card" style="background: #f9fbf2;">
        <h3 style="color: var(--matcha-deep); font-style: italic; margin:0;">The Matcha Review 🍵</h3>
        <p style="color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-top: 10px;">
          I know how much you love Matcha, so I finally tried it. It’s definitely... green. 😂
        </p>
        <div class="media-container">
          <img src="./motcha.png" alt="Matcha Photo">
        </div>
      </div>
    </section>

    <section class="snap-section">
      <div class="card" style="background: #f9fbf2;">
        <h3 style="color: var(--matcha-deep); font-style: italic; margin:0;">First Sip Reactions...</h3>
        <div class="media-container">
          <video id="matchaVideo" loop muted playsinline controls poster="./motcha.png" preload="auto">
            <source src="./starbucks.mov" type="video/quicktime">
            Your browser does not support the video tag.
          </video>
        </div>
      </div>
    </section>

    <div class="snap-section">
      <h2 class="hero-text">Ready for something sweet? 🍫</h2>
    </div>

  </div>

  <script>
    const text = `Hi Jaanu...\n\nChustu chustune 25 days ayipoyindhi kada. Last time when you got this, I was with you.\n\nBefore that, I used to send the flowers, coffee, and ice cream... but this time I can't do any of those.\n\nBut nenu idiot ni kada? Mental fellow ni! Agutanu anukuntunava? NEVER.\n\nSo Jhansy, happy menstrual day!\n\nJaanu, nuvvu iroju prapanchanni chudalekapothe enti? Ah prapanchanni nee daggariki teeskuni vasta! 😂😂\n\nRoju anta ilane navvukunta undhu.`;

    let currentStep = -1; 
    const steps = document.querySelectorAll('.snap-section');
    let canScroll = false;

    function openLetter() {
      document.getElementById('envelope').style.display = 'none';
      document.getElementById('letter-scene').style.display = 'block';
      let i = 0;
      function typeWriter() {
        if (i < text.length) {
          document.getElementById('typed-text').innerHTML += text.charAt(i);
          i++;
          document.getElementById('letter-scene').scrollTop = document.getElementById('letter-scene').scrollHeight;
          setTimeout(typeWriter, 30);
        } else {
          document.getElementById('scrollHint').classList.add('show-hint');
          document.getElementById('main-world').style.display = 'block';
          canScroll = true;
        }
      }
      typeWriter();
    }

    function navigate(direction) {
      if (!canScroll) return;
      const nextStep = (direction === 'down') ? currentStep + 1 : currentStep - 1;
      if (nextStep < 0 || nextStep >= steps.length) return;

      document.getElementById('ceremony-overlay').style.transform = 'translateY(-100vh)';
      
      if (currentStep >= 0) steps[currentStep].classList.remove('active');
      currentStep = nextStep;
      steps[currentStep].classList.add('active');

      const v = document.getElementById('matchaVideo');
      // VIDEO PLAYBACK FIX: Force load and play on Step 4
      if (currentStep === 4) {
        v.load(); // Force a refresh of the video source
        v.play().catch(error => {
          console.log("Autoplay was prevented, showing controls instead.");
        });
      } else {
        v.pause();
      }

      canScroll = false;
      setTimeout(() => { canScroll = true; }, 1500); 
    }

    window.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) < 15) return;
      navigate(e.deltaY > 0 ? 'down' : 'up');
    });

    let ts = 0;
    window.addEventListener('touchstart', (e) => ts = e.touches[0].clientY);
    window.addEventListener('touchend', (e) => {
      let te = e.changedTouches[0].clientY;
      if (ts - te > 60) navigate('down');
      if (te - ts > 60) navigate('up');
    });
  </script>
</body>
</html>
