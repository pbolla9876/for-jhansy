<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift for Jhansy</title>
  <style>
    :root {
      --rose: #c95e8b;
      --rose-deep: #a84871;
      --cream: #fffaf6;
      --paper: #fcfaf7;
      --text: #5b4a4a;
      --muted: #8b7676;
      --green-leaf: #3ba35e;
    }

    * { box-sizing: border-box; }
    body, html { 
      margin: 0; padding: 0; 
      font-family: 'Georgia', serif; 
      background: var(--cream);
      overflow: hidden; /* Lock scrolling during the letter scene */
    }

    /* --- Animations --- */
    @keyframes letterLand {
      0% { transform: translateY(-100px) scale(0.9); opacity: 0; filter: blur(10px); }
      100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
    }
    @keyframes nameFadeIn {
      0% { opacity: 0; filter: blur(5px); }
      100% { opacity: 1; filter: blur(0); }
    }
    @keyframes bounceHint {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
      40% {transform: translateY(-10px) translateX(-50%);}
      60% {transform: translateY(-5px) translateX(-50%);}
    }

    /* --- Phase 1: Opening Ceremony Overlay --- */
    #ceremony-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background: var(--cream); z-index: 5000;
      display: flex; flex-direction: column; align-items: center; justify-content: start;
      padding-top: 10vh;
      transition: all 1s ease;
    }

    /* --- Main Invitation Header --- */
    #invitation-header {
      animation: nameFadeIn 2s ease forwards;
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero-name {
      font-size: 3.5rem; letter-spacing: 5px; color: var(--rose-deep);
      text-transform: uppercase; margin: 0; position: relative;
    }
    .hero-name .leaf { color: var(--green-leaf); position: absolute; right: -50px; top: 5px; }
    .subtitle { color: var(--muted); letter-spacing: 2px; font-size: 1rem; margin-top: 0.5rem;}

    /* --- The Floating & Opening Letter --- */
    .letter-container {
      width: 320px; height: 220px;
      perspective: 1000px; cursor: pointer;
      opacity: 0; /* Starts invisible */
      animation: letterLand 1.5s ease forwards 2.5s; /* Lands after name fades */
      transition: transform 0.3s ease;
    }
    .letter-container:hover { transform: scale(1.03); }

    .letter-border {
      position: relative; width: 100%; height: 100%;
      background: var(--paper); border: 2px solid var(--rose);
      border-radius: 20px;
      box-shadow: 0 15px 45px rgba(180, 140, 140, 0.15);
      overflow: hidden;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* The stationery header fixed inside the letter */
    .letter-stationery-header {
      padding: 20px 25px 5px; border-bottom: 1px solid rgba(200,200,200,0.3);
      background: white;
      text-align: center;
      display: none; /* Initially hidden */
    }
    .stationery-name {
      font-size: 1.5rem; color: var(--rose-deep); margin: 0;
    }
    .stationery-leaf { color: var(--green-leaf); }

    /* The letter text area */
    .letter-body {
      padding: 10px 25px 25px;
      overflow-y: auto; scrollbar-width: none;
      display: none; /* Initially hidden */
    }
    #typed-text {
      font-size: 1rem; line-height: 1.8; color: var(--text);
      white-space: pre-wrap;
    }

    /* --- Opening the Letter State --- */
    .open-letter .letter-border {
      width: 90%; max-width: 600px; height: 70vh;
      border-radius: 25px;
      border: 1px solid var(--white-line);
      background: white;
      box-shadow: 0 25px 70px rgba(0,0,0,0.1);
    }
    .open-letter .letter-stationery-header { display: block; }
    .open-letter .letter-body { display: block; height: calc(70vh - 80px); }

    /* --- Prompts --- */
    .initial-tap-prompt {
      color: var(--muted); font-style: italic; font-size: 0.9rem;
      position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%);
      opacity: 0; animation: nameFadeIn 1.5s ease forwards 4s;
    }

    .scroll-down-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: var(--rose-deep); font-weight: bold;
      opacity: 0; transition: opacity 1s; z-index: 6000;
      display: flex; flex-direction: column; align-items: center;
    }
    .show-scroll { opacity: 1; animation: bounceHint 2s infinite;}

    /* --- Phase 2: Placeholder --- */
    #main-world {
      opacity: 0; filter: blur(20px); transition: all 2s ease;
      padding: 100vh 2rem 5rem; /* Pushed down by 100vh to ensure it's hidden */
    }
    .world-active #main-world { opacity: 1; filter: blur(0); }
    .world-active #ceremony-overlay { opacity: 0; pointer-events: none; }
    .world-active { overflow: auto; } /* Re-enable scrolling */

  </style>
</head>
<body>

  <div id="ceremony-overlay">
    
    <div id="invitation-header">
      <h1 class="hero-name">JHANSY <span class="leaf">🌿</span></h1>
      <p class="subtitle">Today, the world comes to you.</p>
    </div>

    <div class="letter-container" id="letterWrapper">
      <div class="letter-border">
        
        <div class="letter-stationery-header">
           <p class="stationery-name">JHANSY <span class="stationery-leaf">🌿</span></p>
        </div>

        <div class="letter-body" id="letterBody">
          <div id="typed-text"></div>
        </div>
      </div>
    </div>
    
    <p class="initial-tap-prompt" id="tapPrompt">Click the letter to open...</p>
  </div>

  <div class="scroll-down-hint" id="scrollHint">
      Scroll down to begin...
      <span style="font-size:1.5rem">↓</span>
  </div>

  <div id="main-world">
     <h2 style="text-align:center; color:var(--rose-deep); font-size: 2.5rem;">The Garden Awaits 🌿</h2>
     <p style="text-align:center; color:var(--muted); max-width: 500px; margin: 0 auto; line-height:1.7;">Your journey of quiet surprises begins as you scroll. Take your time, there is no rush.</p>
     <div style="height: 100vh;"></div> </div>

  <script>
    const text = `Hi Jaanu...\n\nChustu chustune 25 days ayipoyindhi kada. Last time when you got this, I was with you.\n\nBefore that, I used to send the flowers, coffee, and ice cream... but this time I can't do any of those.\n\nBut nenu idiot ni kada? Mental fellow ni! Agutanu anukuntunava? NEVER.\n\nSo Jhansy, happy menstrual day! Idi kuda "happy" antunna ani thittoku... ledu le, already tittukune unattu unnav... ninnu chuste telsustundhi le. But its ok.\n\nSo Jhansy, here we go. I made something for you to make your spirit high when your body is down.\n\nOka dialogue cheppi finish chesthe super untundhi kada...\n\nJaanu, nuvvu iroju prapanchanni chudalekapothe enti? Ah prapanchanni nee daggariki teeskuni vasta! 😂😂😍😍\n\nHahaha... Baga navvukunnaava? So roju anta ilane navvukunta undhu.`;

    const letterWrapper = document.getElementById('letterWrapper');
    const tapPrompt = document.getElementById('tapPrompt');
    const typedTarget = document.getElementById('typed-text');
    const letterBody = document.getElementById('letterBody');
    const scrollHint = document.getElementById('scrollHint');
    const mainWorld = document.getElementById('main-world');

    let isTyping = false;

    // --- 1. Opening the Letter & Typing ---
    letterWrapper.addEventListener('click', () => {
      if (isTyping) return;
      isTyping = true;
      
      letterWrapper.classList.add('open-letter');
      tapPrompt.style.opacity = '0';
      // Hide the main background header to focus on the letter
      document.getElementById('invitation-header').style.opacity = '0';

      setTimeout(() => {
        let i = 0;
        function typeWriter() {
          if (i < text.length) {
            typedTarget.innerHTML += text.charAt(i);
            i++;
            // Slowly auto-scrolling the letter down as it types
            letterBody.scrollTop = letterBody.scrollHeight;
            setTimeout(typeWriter, 40); // Gentle typing speed
          } else {
            // Once typing finishes, show the scroll prompt
            scrollHint.classList.add('show-scroll');
          }
        }
        typeWriter();
      }, 1000); // Wait for open animation to finish
    });

    // --- 2. Scroll Reveal of the Main World ---
    window.addEventListener('scroll', () => {
      // Small reveal threshold
      if (window.scrollY > 50) {
        document.body.classList.add('world-active');
        scrollHint.classList.remove('show-scroll');
      }
    }, { passive: true });

  </script>
</body>
</html>
