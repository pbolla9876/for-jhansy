<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift for Jhansy</title>
  <style>
    :root {
      --rose: #c95e8b;
      --rose-deep: #a84871;
      --cream: #fffaf6;
      --paper: #ffffff;
      --text: #4a3f3f;
      --muted: #8b7676;
      --green: #3ba35e;
    }

    * { box-sizing: border-box; }
    
    /* --- Fix: Smooth Scroll Snapping --- */
    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    body, html { 
      margin: 0; padding: 0; 
      background: var(--cream);
      font-family: 'Georgia', serif;
      height: 100%;
    }

    /* Each major part is now a "Snap Point" */
    .snap-section {
      height: 100vh;
      width: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- PHASE 1: THE CEREMONY --- */
    #ceremony-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5000; background: var(--cream);
      transition: opacity 1.5s ease;
    }

    @keyframes envelopeLand {
      0% { transform: translateY(-300px) rotate(-10deg); opacity: 0; filter: blur(10px); }
      100% { transform: translateY(0) rotate(0deg); opacity: 1; filter: blur(0); }
    }

    .envelope {
      width: 300px; height: 200px;
      background: #f4ecd8; border: 1px solid #e0d5ba;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; animation: envelopeLand 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .envelope-name { font-size: 1.8rem; color: var(--rose-deep); letter-spacing: 5px; text-transform: uppercase; border-bottom: 2px solid var(--rose); }

    #letter-scene {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%; max-width: 500px; height: 80vh;
      background: var(--paper); border: 15px solid white;
      box-shadow: 0 0 60px rgba(0,0,0,0.15);
      z-index: 6000; overflow-y: auto; scrollbar-width: none;
      padding: 40px 20px;
    }

    .letter-header { text-align: center; margin-bottom: 20px; border-bottom: 1px double #eee; padding-bottom: 15px; }
    .letterhead-name { font-size: 2rem; color: var(--rose-deep); letter-spacing: 6px; text-transform: uppercase; margin: 0; }
    #typed-text { font-size: 1.1rem; line-height: 1.8; color: var(--text); white-space: pre-wrap; }

    /* --- PHASE 2: THE FLOWERS ENTRANCE --- */
    .flower-hero h2 {
      font-size: clamp(2.2rem, 8vw, 4rem);
      color: var(--rose-deep);
      font-style: italic;
      opacity: 0; transform: scale(0.9); filter: blur(10px);
      transition: all 2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .flower-hero.reveal h2 { opacity: 1; transform: scale(1); filter: blur(0); }

    /* --- PHASE 3: CINEMATIC CARD --- */
    .card { 
      background: white; border-radius: 40px; padding: 2.5rem; 
      width: 90%; max-width: 600px;
      box-shadow: 0 30px 100px rgba(150,120,120,0.1);
      opacity: 0; transform: translateY(50px);
      transition: all 2s ease;
    }
    .visible .card { opacity: 1; transform: translateY(0); }

    .media-reveal {
      margin-top: 20px; border-radius: 20px; overflow: hidden;
      position: relative; background: white;
    }
    .media-reveal img {
      width: 100%; display: block; opacity: 0; transform: scale(1.1);
      transition: all 3s ease 0.5s;
    }
    .visible .media-reveal img { opacity: 1; transform: scale(1); }

    /* UI PROMPT */
    .scroll-hint {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: var(--rose-deep); opacity: 0; z-index: 7000;
    }
    .show-hint { opacity: 1; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% {transform:translate(-50%, 0);} 50% {transform:translate(-50%, -10px);} }

    #main-world { display: none; } /* Hidden until letter is open */
  </style>
</head>
<body>

  <div id="ceremony-overlay">
    <div class="envelope" id="envelope" onclick="openLetter()">
      <div class="envelope-name">Jhansy</div>
    </div>

    <div id="letter-scene">
      <div class="letter-header">
        <h1 class="letterhead-name">JHANSY <span style="color:var(--green)">🌿</span></h1>
      </div>
      <div id="typed-text"></div>
    </div>

    <div class="scroll-hint" id="scrollHint">Scroll down... ↓</div>
  </div>

  <div id="main-world">
    
    <div class="snap-section flower-hero" id="flowerHero">
      <h2>Flowers ivvalli kada...</h2>
    </div>

    <section class="snap-section" id="morningSection">
      <div class="card">
        <span style="color: var(--rose-deep); font-weight: bold;">🌸 9:00 AM — Morning Bloom</span>
        <p style="margin-top: 15px; color: var(--muted); line-height: 1.6;">
          Good morning, Jaanu. Nuvvu bayataki vellalenu ante emi parvaledu... ee flowers chustu refresh avvu.
        </p>
        <div class="media-reveal">
          <img src="flowers1.jpg" alt="Morning Flowers">
        </div>
      </div>
    </section>

    <div class="snap-section" style="background:#fffaf6;">
      <p style="color:#ccc;">More surprises coming as you scroll...</p>
    </div>
  </div>

  <script>
    const text = `Hi Jaanu...\n\nChustu chustune 25 days ayipoyindhi kada. Last time when you got this, I was with you.\n\nBefore that, I used to send the flowers, coffee, and ice cream... but this time I can't do any of those.\n\nBut nenu idiot ni kada? Mental fellow ni! Agutanu anukuntunava? NEVER.\n\nSo Jhansy, happy menstrual day! Idi kuda "happy" antunna ani thittoku... ledu le, already tittukune unattu unnav... ninnu chuste telsustundhi le. But its ok.\n\nSo Jhansy, here we go. I made something for you to make your spirit high when your body is down.\n\nOka dialogue cheppi finish chesthe super untundhi kada...\n\nJaanu, nuvvu iroju prapanchanni chudalekapothe enti? Ah prapanchanni nee daggariki teeskuni vasta! 😂😂😍😍\n\nHahaha... Baga navvukunnaava? So roju anta ilane navvukunta undhu.`;

    function openLetter() {
      const env = document.getElementById('envelope');
      const scene = document.getElementById('letter-scene');
      const typedTarget = document.getElementById('typed-text');
      const scrollHint = document.getElementById('scrollHint');
      const world = document.getElementById('main-world');

      env.style.opacity = '0';
      
      setTimeout(() => {
        env.style.display = 'none';
        scene.style.display = 'block';
        
        let i = 0;
        function typeWriter() {
          if (i < text.length) {
            typedTarget.innerHTML += text.charAt(i);
            i++;
            scene.scrollTop = scene.scrollHeight;
            setTimeout(typeWriter, 35);
          } else {
            scrollHint.classList.add('show-hint');
            world.style.display = 'block'; // Prepare world
            document.body.style.overflow = 'auto'; 
          }
        }
        typeWriter();
      }, 800);
    }

    // Auto-reveal on scroll
    window.addEventListener('scroll', () => {
      const overlay = document.getElementById('ceremony-overlay');
      const hero = document.getElementById('flowerHero');
      const morning = document.getElementById('morningSection');

      if (window.scrollY > 50) overlay.style.opacity = '0';

      const heroTop = hero.getBoundingClientRect().top;
      const morningTop = morning.getBoundingClientRect().top;

      if (heroTop < window.innerHeight * 0.5) hero.classList.add('reveal');
      if (morningTop < window.innerHeight * 0.5) morning.classList.add('visible');
    });
  </script>
</body>
</html>
