<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift for Jhansy</title>
  <style>
    :root {
      --rose: #c95e8b;
      --rose-deep: #a84871;
      --cream: #fffaf6;
      --paper: #fcfaf7;
      --text: #5b4a4a;
      --muted: #8b7676;
    }

    * { box-sizing: border-box; }
    body, html { 
      margin: 0; padding: 0; 
      font-family: 'Georgia', serif; 
      background: var(--cream);
      overflow-x: hidden;
    }

    /* --- Phase 1: The Opening Overlay --- */
    #opening-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background: var(--cream); z-index: 5000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .envelope-container {
      position: relative; width: 320px; height: 220px;
      perspective: 1000px; cursor: pointer;
    }

    .envelope {
      position: relative; width: 100%; height: 100%;
      background: #f4ecd8; border: 1px solid #e0d5ba;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      transition: transform 0.6s;
    }

    .flap {
      position: absolute; top: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid transparent; border-right: 160px solid transparent;
      border-top: 110px solid #decba4;
      transform-origin: top; transition: transform 0.8s ease; z-index: 3;
    }

    .letter {
      position: absolute; top: 5px; left: 10px; width: 300px; height: 200px;
      background: var(--paper); padding: 25px;
      z-index: 2; transition: all 0.8s ease;
      box-shadow: 0 0 15px rgba(0,0,0,0.05);
      overflow-y: auto; scrollbar-width: none;
    }

    /* Envelope Opening Animation */
    .open .flap { transform: rotateX(180deg); z-index: 1; }
    .open .letter { 
      transform: translateY(-120px); 
      height: 420px; 
      z-index: 4; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    }

    #typed-text {
      font-size: 1.05rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap;
    }

    .hint-text {
      margin-top: 40px; color: var(--muted); font-style: italic;
      font-size: 0.9rem; animation: pulse 2s infinite;
    }

    @keyframes pulse { 0% {opacity: 0.4;} 50% {opacity: 1;} 100% {opacity: 0.4;} }

    /* --- Phase 2: The Main World (Hidden initially) --- */
    #main-world {
      opacity: 0; transform: scale(0.98); filter: blur(10px);
      transition: all 2s ease;
      padding-top: 20vh;
    }

    .world-active #main-world { opacity: 1; transform: scale(1); filter: blur(0); }
    .world-active #opening-overlay { opacity: 0; pointer-events: none; }

    .scroll-hint {
      text-align: center; margin-top: 30px; font-weight: bold;
      color: var(--rose-deep); opacity: 0; transition: opacity 1s;
    }
    .show-scroll { opacity: 1; }

  </style>
</head>
<body>

  <div id="opening-overlay">
    <div class="envelope-container" id="envelopeWrapper">
      <div class="envelope" id="mainEnvelope">
        <div class="flap"></div>
        <div class="letter">
          <div id="typed-text"></div>
          <div id="final-cta" class="scroll-hint">Scroll down to see the world... ↓</div>
        </div>
      </div>
    </div>
    <p class="hint-text" id="tapPrompt">Click to open your letter...</p>
  </div>

  <div id="main-world">
     <h1 style="text-align:center; color:var(--rose-deep); font-size: 3rem;">JHANSY 🌿</h1>
     <p style="text-align:center; color:var(--muted);">Today, the world comes to you.</p>
     <div style="height: 100vh;"></div> 
  </div>

  <script>
    const text = `Hi Jaanu...\n\nChustu chustune 25 days ayipoyindhi kada. Last time when you got this, I was with you.\n\nBefore that, I used to send the flowers, coffee, and ice cream... but this time I can't do any of those.\n\nBut nenu idiot ni kada? Mental fellow ni! Agutanu anukuntunava? NEVER.\n\nSo Jhansy, happy menstrual day! Idi kuda "happy" antunna ani thittoku... ledu le, already tittukune unattu unnav... ninnu chuste telsustundhi le. But its ok.\n\nSo Jhansy, here we go. I made something for you to make your spirit high when your body is down.\n\nOka dialogue cheppi finish chesthe super untundhi kada...\n\nJaanu, nuvvu iroju prapanchanni chudalekapothe enti? Ah prapanchanni nee daggariki teeskuni vasta! 😂😂😍😍\n\nHahaha... Baga navvukunnaava? So roju anta ilane navvukunta undhu.`;

    const envelope = document.getElementById('envelopeWrapper');
    const typedTarget = document.getElementById('typed-text');
    const tapPrompt = document.getElementById('tapPrompt');
    const finalCta = document.getElementById('final-cta');
    let isTyping = false;

    envelope.addEventListener('click', () => {
      if (isTyping) return;
      isTyping = true;
      
      envelope.classList.add('open');
      tapPrompt.style.opacity = '0';

      // Start typing after envelope flap opens
      setTimeout(() => {
        let i = 0;
        function typeWriter() {
          if (i < text.length) {
            typedTarget.innerHTML += text.charAt(i);
            i++;
            // Slowly scrolling the letter down as it types so she sees the new lines
            document.querySelector('.letter').scrollTop = document.querySelector('.letter').scrollHeight;
            setTimeout(typeWriter, 45); 
          } else {
            finalCta.classList.add('show-scroll');
          }
        }
        typeWriter();
      }, 1000);
    });

    // Detect first scroll to dissolve the opening scene
    window.addEventListener('scroll', () => {
      if (window.scrollY > 40) {
        document.body.classList.add('world-active');
      }
    }, { passive: true });

  </script>
</body>
</html>
