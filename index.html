<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Jhansy Experience — v2</title>

<style>
:root {
  --bg: #fbf6ee;
  --paper: #fdfbf7;
  --text: #2f241d;
  --rose: #8d3b4c;
  --matcha: #638a57;
  --ice: #8db9d7;
  --heart: #bc4d63;
}

body {
  margin: 0;
  font-family: Georgia, serif;
  background: var(--bg);
  overflow: hidden;
}

/* ===== BASIC LAYOUT ===== */

.section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.journey {
  transition: transform 0.7s ease;
}

/* ===== LOCK OVERLAY ===== */

.section-lock {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.9);
}

.section-lock.hidden {
  display: none;
}

/* ===== NAV ===== */

.nav-btn {
  position: fixed;
  bottom: 20px;
  padding: 10px 16px;
  border-radius: 999px;
  border: none;
  background: white;
  cursor: pointer;
}

.next { right: 20px; }
.prev { left: 20px; }

/* ===== REDUCED MOTION ===== */

@media (prefers-reduced-motion: reduce) {
  * {
    animation: none !important;
    transition: none !important;
  }
}
</style>
</head>

<body>

<div class="journey" id="journey">

  <!-- SECTION 1 -->
  <section class="section" data-index="0">
    <h1>Flowers ivvalli kada 🌸</h1>
    <div class="section-lock hidden"></div>
  </section>

  <!-- SECTION 2 -->
  <section class="section" data-index="1">
    <h1>Starbucks Story 🍵</h1>
    <div class="section-lock hidden"></div>
  </section>

  <!-- SECTION 3 -->
  <section class="section" data-index="2">
    <video muted loop playsinline preload="metadata" class="phase-video">
      <source src="starbucks.mp4" type="video/mp4">
    </video>
    <div class="section-lock hidden"></div>
  </section>

</div>

<button class="nav-btn prev">Prev</button>
<button class="nav-btn next">Next</button>

<script>

/* ======================
   CENTRAL STATE
====================== */

const state = {
  currentSection: 0,
  lockedSections: [false, true, true]
};

/* ======================
   ELEMENTS
====================== */

const journey = document.getElementById("journey");
const sections = document.querySelectorAll(".section");
const nextBtn = document.querySelector(".next");
const prevBtn = document.querySelector(".prev");

/* ======================
   NAVIGATION
====================== */

function goToSection(index) {
  if (index < 0 || index >= sections.length) return;

  if (state.lockedSections[index]) {
    showLock(index);
    return;
  }

  state.currentSection = index;
  journey.style.transform = `translateY(-${index * 100}vh)`;

  controlMedia();
}

function move(delta) {
  goToSection(state.currentSection + delta);
}

nextBtn.onclick = () => move(1);
prevBtn.onclick = () => move(-1);

/* ======================
   LOCK SYSTEM (NEW)
====================== */

function showLock(index) {
  const lock = sections[index].querySelector(".section-lock");
  lock.innerHTML = `
    <div>
      <h2>Coming Soon ❤️</h2>
      <p>This unlocks later...</p>
    </div>
  `;
  lock.classList.remove("hidden");

  setTimeout(() => lock.classList.add("hidden"), 1500);
}

/* ======================
   MEDIA CONTROL
====================== */

function controlMedia() {
  document.querySelectorAll("video").forEach((v, i) => {
    if (i === state.currentSection) {
      v.play().catch(()=>{});
    } else {
      v.pause();
      v.currentTime = 0;
    }
  });
}

/* ======================
   KEYBOARD SUPPORT
====================== */

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown") move(1);
  if (e.key === "ArrowUp") move(-1);
});

/* ======================
   INIT
====================== */

goToSection(0);

</script>

</body>
</html>
