<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jhansy Journey ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family: Georgia, serif;
  background:#fdfbf7;
}

.section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  max-width:800px;
  padding:30px;
  background:#fdfbf7;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.1);
  clip-path: polygon(2% 5%, 98% 3%, 97% 97%, 3% 98%);
}

h2{
  font-family:'Playfair Display', serif;
  font-style:italic;
}

.locked{
  text-align:center;
}

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="petals"></canvas>

<div id="content">

<div class="section" id="phase1"></div>
<div class="section" id="phase2"></div>
<div class="section" id="phase3"></div>
<div class="section" id="phase4"></div>
<div class="section" id="phase5"></div>

</div>

<!-- DEV PANEL -->
<div style="position:fixed;bottom:10px;left:10px;background:#fff;padding:10px;border-radius:10px;z-index:999;">
<button onclick="go(0)">Morning</button>
<button onclick="go(1)">Matcha</button>
<button onclick="go(2)">IceCream</button>
<button onclick="go(3)">Movie</button>
<button onclick="go(4)">Night</button>
</div>

<div id="clock" style="position:fixed;top:10px;right:10px;background:#fff;padding:8px 12px;border-radius:8px;font-size:12px;"></div>

<script>

/* 🔥 TEST MODE */
const DEV_MODE = true;

/* CST TIME */
function getCST(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Chicago"}));
}

function unlocked(h,m){
  if(DEV_MODE) return true;
  const now=getCST();
  return now.getHours()>h || (now.getHours()==h && now.getMinutes()>=m);
}

/* NAV */
function go(i){
  document.querySelectorAll('.section')[i].scrollIntoView({behavior:"smooth"});
}

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText =
    "CST: "+getCST().toLocaleTimeString();
},1000);

/* RENDER */
function render(){

document.getElementById("phase1").innerHTML = `
<div class="card">
<h2>Morning 🌸</h2>

<p>
Hi Jhansy...

Chustu chustune 25 days ayipoyindhi kada...

But nenu idiot ni kada? Mental fellow ni!

Jhansy... iroju nuvvu prapanchanni chudalekapothe enti?

Nene prapanchanni teeskuni vasta...
</p>

<p><b>Yeah Jhansy, here is the first surprise for you... your favorite flowers! 🌸</b></p>

<img src="flowers1.jpg" width="100%">

<p>
Yeah neku esari send cheyalekapothuna... but idiot ni ela silent ga kurchunta chepu?

So anduke 4 days mundhu nunchi e plan start chesa.

So here we go, teesko nee flowers... bagunnaya? 😁

So Jhansy, Don't take too much stress, okay?

Good Morning, my psycho! 😊
</p>
</div>
`;

document.getElementById("phase2").innerHTML = `
<div class="card">
<h2>Matcha Break ☕</h2>

<p>
Haha, welcome back Jhansy!

Ra, velli Ice Matcha Latte thagudaam 😂
</p>

<img src="motcha.png" width="100%">
<video src="starbucks.mp4" controls width="100%"></video>

</div>
`;

document.getElementById("phase3").innerHTML = `
<div class="card">
<h2>Ice Cream 🍦</h2>

<p>
Hi Jhansy, welcome back again!

Time for ICE CREAM 🍦
</p>

<img src="icecream_photo.jpg" width="100%">
<video src="icecream.mov" controls width="100%"></video>

</div>
`;

document.getElementById("phase4").innerHTML = `
<div class="card">
<h2>Movie Night 🎬</h2>

<p>Relax mode ON ✨</p>

<iframe width="100%" height="400"
src="https://www.youtube.com/embed/3FO__vGFYTs"
allowfullscreen></iframe>

</div>
`;

document.getElementById("phase5").innerHTML = `
<div class="card">
<h2>Good Night 🌙</h2>

<p>
Day is done, Jhansy...

Sleep well, psycho ❤️
</p>

</div>
`;

}

render();

/* PETALS */
const canvas=document.getElementById("petals");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let petals=[];
for(let i=0;i<40;i++){
  petals.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    speed:1+Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  petals.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle="pink";
    ctx.fill();
    p.y+=p.speed;
    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
